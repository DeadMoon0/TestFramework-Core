name: Unit Tests

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: unit-tests-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: unit-tests
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore test projects
        run: |
          dotnet restore UnitTests/TestFramework.Config.Tests/TestFramework.Config.Tests.csproj
          dotnet restore UnitTests/TestFramework.Core.Tests/TestFramework.Core.Tests.csproj
          dotnet restore UnitTests/TestFramework.Simple.Tests/TestFramework.Simple.Tests.csproj

      - name: Run unit tests
        run: |
          dotnet test UnitTests/TestFramework.Config.Tests/TestFramework.Config.Tests.csproj --configuration Release --no-restore --logger "trx"
          dotnet test UnitTests/TestFramework.Core.Tests/TestFramework.Core.Tests.csproj --configuration Release --no-restore --logger "trx"
          dotnet test UnitTests/TestFramework.Simple.Tests/TestFramework.Simple.Tests.csproj --configuration Release --no-restore --logger "trx"